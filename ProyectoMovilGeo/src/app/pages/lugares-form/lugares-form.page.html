<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>{{id ? 'Editar' : 'Nuevo'}}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
<ion-card class="card">
  <ion-card-header>
    <ion-card-title>Datos</ion-card-title>
    </ion-card-header>
  <ion-card-content>
    <ion-item>
      <ion-label position="stacked">Título</ion-label>
      <ion-input [(ngModel)]="lugar.titulo"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Descripción</ion-label>
      <ion-textarea [(ngModel)]="lugar.descripcion"></ion-textarea>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Fecha</ion-label>
      <ion-input type="date" [(ngModel)]="lugar.fecha"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Categorias</ion-label>
      <ion-select [(ngModel)]="lugar.categoria">
        <ion-select-option value="Turismo">Turismo</ion-select-option>
        <ion-select-option value="Comida">Comida</ion-select-option>
        <ion-select-option value="Cultura">Cultura</ion-select-option>
      </ion-select>
    </ion-item>

  <ion-button expand="block" (click)="usarMiUbicacion()">
  <ion-icon name="locate-outline" slot="start"></ion-icon>
  Usar Ubicacion
  </ion-button>

    <ion-item>
      <ion-label>Latitud</ion-label>
      <ion-input slot="end">{{lugar.lat | number:'1.6-6'}}</ion-input>
    </ion-item>

    <ion-item>
      <ion-label>Longitud</ion-label>
      <ion-input slot="end">{{lugar.lng | number:'1.6-6'}}</ion-input>
    </ion-item>

    <ion-button expand="block" (click)="guardar()">
    <ion-icon name="save-outline" slot="start"></ion-icon>
    Guardar
    </ion-button>

  </ion-card-content>
  </ion-card>

  </ion-content>
